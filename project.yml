# XcodeGen spec for Monostone iOS native app
# -------------------------------------------
# Run `xcodegen generate` whenever this file changes.
# The generated .xcodeproj is NOT committed — it's fully derivable from this spec.
# Build: xcodebuild -scheme MonostoneApp -destination 'generic/platform=iOS Simulator' build

name: MonostoneApp

options:
  bundleIdPrefix: com.monostone
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug
  xcodeVersion: "26.2"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: ""
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  MonostoneApp:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "Resources/MockData/**"
      # 把 MockData 下的 JSON 放到 Resources build phase.
      - path: App/Resources/MockData
        buildPhase: resources
      # Shared/ 放 App ↔ Widget 共享的类型 + 工具 (SharedModels, SharedDataWriter).
      # 两个 target 都引用这个 path, 所以这些 .swift 文件会被编译到两个进程里.
      - path: Shared
    resources:
      - path: App/Assets.xcassets
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Monostone
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIUserInterfaceStyle: Dark
        NSMicrophoneUsageDescription: "Monostone 需要麦克风来录制会议和捕捉灵感"
        NSBluetoothAlwaysUsageDescription: "Monostone 需要通过蓝牙连接你的 Monostone 戒指"
        NSCalendarsUsageDescription: "Monostone 会把待办同步到你的日历"
        NSRemindersUsageDescription: "Monostone 会把 Action Items 写入提醒事项"
        # Deep link URL scheme: monostone://card/{cardId}
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - monostone
            CFBundleURLName: com.monostone.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.monostone.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: App/MonostoneApp.entitlements
    dependencies:
      - target: MonostoneWidget
        embed: true

  # ============ Widget Extension ============
  MonostoneWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: MonostoneWidget
      - path: Shared
    info:
      path: MonostoneWidget/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.monostone.app.widget
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_ENTITLEMENTS: MonostoneWidget/MonostoneWidget.entitlements

  # ============ Tests ============
  MonostoneAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AppTests
    dependencies:
      - target: MonostoneApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.monostone.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  MonostoneApp:
    build:
      targets:
        MonostoneApp: all
        MonostoneAppTests: [test]
        MonostoneWidget: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MonostoneAppTests
