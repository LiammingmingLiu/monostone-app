# XcodeGen spec for Monostone iOS native app
# -------------------------------------------
# Run `xcodegen generate` whenever this file changes.
# The generated .xcodeproj is NOT committed — it's fully derivable from this spec.
# Build: xcodebuild -scheme MonostoneApp -destination 'generic/platform=iOS Simulator' build

name: MonostoneApp

options:
  bundleIdPrefix: com.monostone
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug
  xcodeVersion: "26.2"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: ""
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  MonostoneApp:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "Resources/MockData/**"
    resources:
      - path: App/Assets.xcassets
      - path: App/Resources/MockData
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Monostone
        # iOS 14+: 用 UILaunchScreen 空字典告诉系统"这是现代 app, 用默认 launch screen".
        # 不要用 UILaunchStoryboardName="" (空字符串) —— iOS 会去找不存在的 storyboard
        # 然后显示纯黑屏, 这是 root view 根本没加载的主要原因.
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIUserInterfaceStyle: Dark
        NSMicrophoneUsageDescription: "Monostone 需要麦克风来录制会议和捕捉灵感"
        NSBluetoothAlwaysUsageDescription: "Monostone 需要通过蓝牙连接你的 Monostone 戒指"
        NSCalendarsUsageDescription: "Monostone 会把待办同步到你的日历"
        NSRemindersUsageDescription: "Monostone 会把 Action Items 写入提醒事项"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.monostone.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        SUPPORTS_MACCATALYST: NO
        # 不加 GENERATE_INFOPLIST_FILE: 我们用自定义 Info.plist (info.path 已指定),
        # GENERATE_INFOPLIST_FILE=YES 会让 Xcode 和自定义 plist 冲突.

  MonostoneAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AppTests
    dependencies:
      - target: MonostoneApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.monostone.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  MonostoneApp:
    build:
      targets:
        MonostoneApp: all
        MonostoneAppTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MonostoneAppTests
